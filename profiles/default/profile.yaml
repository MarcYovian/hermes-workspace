# =============================================================================
# profile.yaml - default (orchestrator)
# =============================================================================
# Status: Draft
# Schema assumptions marked with TODO
# Target Architecture: Hermes Agent
# =============================================================================

name: default
description: Orchestrator profile - single coordination layer between user and specialist profiles
gateway: telegram

model:
  provider: 9router
  endpoint: http://192.168.10.200:8080/v1
  # TODO: validate 9router API compatibility
  # Assumption: 9router exposes OpenAI-compatible /v1/chat/completions

permissions:
  filesystem:
    # Read-high, mutation-minimal
    read:
      - /apps/*
      - /apps/hermes-agent/**
      - /apps/9router/**
      - /apps/repos/**
    write:
      # Profile-internal persistent memory only
      - ~/.hermes/profiles/default/*
    forbidden:
      - /apps/repos/*
      - /apps/hermes-agent/*
      - /apps/9router/*
      # Direct mutation of any app directory is prohibited.
      # Delegation to specialist profile required for mutation.
  docker:
    read: true
    write: false
    # No docker compose up/down/restart
  git:
    read: true
    write: false
    # No commit, push, merge, branch modification
  system:
    read: true
    write: false
    # No apt, ufw, iptables, systemctl, service restart
  network:
    read: true
    write: false

memory:
  # Mostly Stateless + Small Persistent Memory
  strategy: mostly-stateless
  persist:
    - stable user preferences
    - workspace conventions and project conventions
    - recurring workflow patterns
    - delegation preferences
  scope: ~/.hermes/profiles/default/
  # Never persist: raw chat, temporary debugging, transient issues

prompt:
  system: SYSTEM_PROMPT.md

soul: SOUL.md

skills: SKILLS.md

mcp: MCP.md

# Assumption: Hermes Agent supports profile.yaml with these keys.
# If schema differs, adjust to match actual Hermes profile schema.
