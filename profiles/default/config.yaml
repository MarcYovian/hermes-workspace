# Hermes Profile Configuration
# See: https://hermes-agent.nousresearch.com/docs/user-guide/profiles
# Assumption: Hermes config.yaml uses this key structure.
# Test with: hermes -p default config get model.default

model:
  default: "9router-model"
  # 9Router at http://192.168.10.200:8080/v1
  # Configure provider via: hermes -p default setup

terminal:
  cwd: /apps
  # Start directory for terminal commands

# Note: .env contains TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, LLM_API_KEY
# Copy .env.EXAMPLE to .env and fill in credentials after install.
